service_switch:
  description: Change active service for a given stream index.
  fields:
    index: {description: Index of the stream., example: 1}
    target: {description: Target service, optional., example: SERVICE_1}

get_epg:
  description: >-
    Return EPG (programme guide) events as response data. Optionally filter by
    channel and limit the time window.
  fields:
    channel:
      description: Channel name (or UUID). Omit to return all channels.
      example: ZDF HD
      selector:
        text:
    hours:
      description: How many hours ahead to include (1-168).
      example: 6
      default: 6
      selector:
        number:
          min: 1
          max: 168
          unit_of_measurement: h
